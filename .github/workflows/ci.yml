name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -race

      # Lint step disabled — golangci-lint doesn't support Go 1.26 yet
      # Re-enable when a compatible version is released
      # - name: Lint
      #   uses: golangci/golangci-lint-action@v7
      #   with:
      #     version: latest
